<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphCut Textures — Extraction and Synthesis</title>
    <link rel="stylesheet" href="styles.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="3"/>
                    <path d="M3 9h18M9 3v18"/>
                </svg>
                <span>GraphCut Textures</span>
            </div>
            <!-- <span class="header-subtitle">交互式图像分割与纹理合成</span> -->
        </div>
    </header>

    <main class="main">

        <!-- ========== 第一段: 图像分割 ========== -->
        <section class="section" id="segmentationSection">
            <!--div class="section-header">
                <span class="section-badge">Step 1</span>
                <h2>图像分割</h2>
                <p class="section-desc">选择图像，框选目标区域，一键提取前景纹理</p>
            </div-->

            <div class="segmentation-layout">
                <!-- 左侧: 原始图像 -->
                <div class="panel panel-source">
                    <div class="panel-label">原始图像</div>
                    <div class="image-wrapper" id="sourceWrapper">
                        <div class="image-placeholder" id="sourcePlaceholder">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5" fill="#94a3b8" stroke="none"/>
                                <path d="M21 15l-5-5L5 21"/>
                            </svg>
                            <span>点击此处选择图像</span>
                            <span class="placeholder-hint">支持 JPG / PNG / WebP</span>
                        </div>
                        <img id="sourceImage" alt="原始图像" style="display:none;" draggable="false"/>
                        <canvas id="selectionCanvas" style="display:none;"></canvas>
                        <!-- 选区信息提示 -->
                        <div class="selection-info" id="selectionInfo" style="display:none;">
                            <span id="selectionInfoText"></span>
                        </div>
                    </div>
                    <div class="panel-actions">
                        <button class="btn btn-outline" id="btnReselect">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.5 15a9 9 0 1 0 2.1-9.4L1 10"/></svg>
                            重新选图
                        </button>
                        <button class="btn btn-outline btn-danger" id="btnCancelSelection" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            取消选区
                        </button>
                    </div>
                </div>

                <!-- 中间: 箭头按钮 -->
                <div class="arrow-zone">
                    <div class="arrow-line"></div>
                    <button class="arrow-btn" id="btnSegment" disabled title="执行分割">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>
                    <div class="arrow-label">分割</div>
                </div>

                <!-- 右侧: 分割结果 -->
                <div class="panel panel-result">
                    <div class="panel-label">分割结果</div>
                    <div class="image-wrapper" id="resultWrapper">
                        <div class="image-placeholder" id="resultPlaceholder">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <path d="M12 8v8M8 12h8"/>
                            </svg>
                            <span>等待分割结果</span>
                            <span class="placeholder-hint">在左侧框选区域后点击箭头</span>
                        </div>
                        <img id="resultImage" alt="分割结果" style="display:none;" draggable="false"/>
                    </div>
                    <!-- 加载动画 -->
                    <div class="loading-overlay" id="segmentLoading" style="display:none;">
                        <div class="spinner"></div>
                        <span>正在分割...</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 分隔线 -->
        <div class="divider">
            <span>纹理合成</span>
        </div>

        <!-- ========== 第二段: 纹理贴图 ========== -->
        <section class="section" id="textureSection">
            <!--div class="section-header">
                <span class="section-badge">Step 2</span>
                <h2>纹理贴图</h2>
                <p class="section-desc">基于分割结果，生成指定尺寸的无缝纹理</p>
            </div-->

            <div class="texture-layout">
                <!-- 控制栏 -->
                <div class="texture-controls">
                    <div class="control-group">
                        <label for="textureWidth">宽度</label>
                        <div class="input-with-unit">
                            <input type="number" id="textureWidth" placeholder="512" min="64" max="4096" step="16"/>
                            <span class="unit">px</span>
                        </div>
                    </div>
                    <span class="times">×</span>
                    <div class="control-group">
                        <label for="textureHeight">高度</label>
                        <div class="input-with-unit">
                            <input type="number" id="textureHeight" placeholder="512" min="64" max="4096" step="16"/>
                            <span class="unit">px</span>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-texture" id="btnTexture" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M2 12h20M12 2v20"/></svg>
                        生成贴图
                    </button>
                </div>

                <!-- 贴图结果 -->
                <div class="texture-result-wrapper">
                    <div class="panel panel-full">
                        <div class="panel-label">贴图结果</div>
                        <div class="image-wrapper texture-preview" id="textureWrapper">
                            <div class="image-placeholder" id="texturePlaceholder">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
                                    <rect x="2" y="2" width="20" height="20" rx="3"/>
                                    <rect x="6" y="6" width="5" height="5" rx="1"/>
                                    <rect x="13" y="6" width="5" height="5" rx="1"/>
                                    <rect x="6" y="13" width="5" height="5" rx="1"/>
                                    <rect x="13" y="13" width="5" height="5" rx="1"/>
                                </svg>
                                <span>等待生成贴图</span>
                                <span class="placeholder-hint">请先在 Step 1 完成分割，再设置尺寸</span>
                            </div>
                            <img id="textureImage" alt="贴图结果" style="display:none;" draggable="false"/>
                        </div>
                    </div>
                    <!-- 加载动画 -->
                    <div class="loading-overlay" id="textureLoading" style="display:none;">
                        <div class="spinner"></div>
                        <span>正在生成贴图...</span>
                    </div>
                </div>

                <!-- 下载按钮 -->
                <div class="texture-actions">
                    <button class="btn btn-download" id="btnDownload" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        下载贴图
                    </button>
                    <span class="download-hint" id="downloadHint">完成贴图生成后即可下载</span>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>基于 GraphCut Textures (Kwatra et al., SIGGRAPH 2003) &amp; GrabCut (Rother et al., SIGGRAPH 2004)</p>
    </footer>

    <!-- 隐藏的文件选择器 -->
    <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden/>

    <script src="app.js?v=3"></script>
</body>
</html>
